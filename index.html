<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minimal Trading Journal</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0b1120;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .app {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding-bottom: 16px;
    }

    .title {
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .card {
      background: #111b34;
      border-radius: 16px;
      padding: 18px;
      border: 1px solid rgba(71, 85, 105, 0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card h2 {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    label {
      font-size: 0.85rem;
      color: #cbd5f5;
    }

    input[type="file"],
    input[type="text"],
    input[type="number"] {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(51, 65, 85, 0.8);
      background: #0b1227;
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 0.9rem;
    }

    input[type="file"] {
      padding: 8px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hint {
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">Trading Journal</div>
      <div class="subtitle">Minimal upload + numerology tracking</div>
    </header>

    <section class="card">
      <h2>Time-frame screenshots</h2>
      <div class="stack">
        <label for="dailyShot">Daily time-frame screenshot</label>
        <input id="dailyShot" type="file" accept="image/*" />
      </div>
      <div class="stack">
        <label for="fourHourShot">4-hour time-frame screenshot</label>
        <input id="fourHourShot" type="file" accept="image/*" />
      </div>
      <div class="stack">
        <label for="oneHourShot">1-hour time-frame screenshot</label>
        <input id="oneHourShot" type="file" accept="image/*" />
      </div>
      <p class="hint">Uploads are local to your browser session and won’t be stored.</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Numerology day</h2>
        <label for="numerologyDay">What day is it numerologically?</label>
        <input id="numerologyDay" type="text" placeholder="Example: 7 Day" />
      </div>
      <div class="card">
        <h2>Monthly numerology</h2>
        <label for="usaMonth">USA personal month</label>
        <input id="usaMonth" type="text" placeholder="Example: 5" />
        <label for="universalMonth">Universal month</label>
        <input id="universalMonth" type="text" placeholder="Example: 2" />
      </div>
    </section>
  </div>
</body>
</html>
